<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎈 Balloon Pop – EduPlay</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(150deg, #0D1B4B, #1B2B6B, #243580);
            margin: 0;
            min-height: 100vh;
            padding: 15px;
        }
        /* Shared container style (like quiz) */
        .game-wrapper, .name-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,240,0.95);
            border-radius: 50px;
            padding: 20px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }
        .dev-message {
            background: #f1c40f;
            color: #2c3e50;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 20px;
            border: 2px solid white;
        }
        h1, .name-title {
            text-align: center;
            color: #ff6b6b;
            text-shadow: 2px 2px 0 #fff;
            margin: 0 0 10px 0;
            font-size: 2rem;
        }
        .name-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 28px 22px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
            backdrop-filter: blur(12px);
        }
        .name-logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .name-title {
            color: white;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 2px;
        }
        .name-title span {
            color: #E8B84B;
        }
        .name-motto {
            color: #E8B84B;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 3px;
            font-style: italic;
        }
        .name-tagline {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .name-input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 11px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 800;
            color: white;
            outline: none;
            margin-bottom: 10px;
        }
        .name-btn {
            width: 100%;
            background: #C9963A;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(201,150,58,0.4);
        }
        .name-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .name-area input {
            padding: 10px 18px;
            font-size: 1rem;
            border-radius: 50px;
            border: none;
            text-align: center;
            width: 200px;
        }
        .level-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .level-btn {
            background: #f9ca24;
            border: none;
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #e67e22;
            transition: 0.1s;
        }
        .level-btn.active {
            background: #f6e58d;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #e67e22;
        }
        .level-btn.locked {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.2);
        }
        .current-level {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            background: #ff6b6b;
            color: white;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 40px;
            margin-bottom: 15px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #2c3e50;
            color: white;
            padding: 10px 18px;
            border-radius: 50px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 8px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .start-btn, .restart-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .start-btn {
            background: #2ecc71;
            color: white;
        }
        .restart-btn {
            background: #e67e22;
            color: white;
        }
        .game-area {
            background: rgba(255,255,255,0.4);
            border-radius: 30px;
            height: 480px;
            position: relative;
            overflow: hidden;
            border: 4px solid white;
        }
        .balloon {
            position: absolute;
            width: 55px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            animation: floatUp linear forwards;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 15px;
            background: brown;
        }
        .balloon.bad {
            background: #95a5a6;
            box-shadow: inset 0 0 0 2px #2c3e50;
        }
        .balloon.bad::before {
            content: '❌';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
        }
        .balloon.good {
            background: gold;
            box-shadow: 0 0 8px gold;
        }
        .balloon.good::before {
            content: '⭐';
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 18px;
        }
        @keyframes floatUp {
            0% { bottom: -80px; }
            100% { bottom: 100%; }
        }
        .score-pop {
            position: fixed;
            font-size: 26px;
            font-weight: bold;
            pointer-events: none;
            animation: popEffect 0.5s ease-out forwards;
            z-index: 200;
        }
        @keyframes popEffect {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .leaderboard {
            background: white;
            border-radius: 30px;
            padding: 15px;
            margin-top: 20px;
        }
        .leaderboard h3 {
            margin: 0 0 10px 0;
            text-align: center;
        }
        .leaderboard table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 0.8rem;
        }
        .leaderboard th, .leaderboard td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .popup-card {
            background: white;
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            max-width: 280px;
            width: 80%;
        }
        .popup-card button {
            background: #2ecc71;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            margin: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .popup-card .cancel {
            background: #e74c3c;
            color: white;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        @media (max-width: 600px) {
            .balloon { width: 48px; height: 58px; }
            .stats { font-size: 0.8rem; }
            .game-area { height: 420px; }
        }
    </style>
</head>
<body>
<!-- NAME SCREEN (similar to quiz) -->
<div id="nameScreen" class="screen active">
    <div class="name-card">
        <div class="name-logo">🎓</div>
        <div class="name-title">MY <span>Edu</span> Hub</div>
        <div class="name-motto">Where Learning Meets Success</div>
        <div class="name-tagline">Let's play Balloon Pop!</div>
        <input class="name-input" id="playerNameInput" type="text" placeholder="Your name..." maxlength="20">
        <button class="name-btn" id="enterGameBtn">Start Game →</button>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
    <div class="game-wrapper">
        <div class="dev-message">
            🚧 More games & quizzes coming soon! Stay tuned. 🚧
        </div>
        <h1>🎈 Balloon Pop 🎈</h1>

        <div class="level-selector" id="levelSelector"></div>

        <div style="text-align: center;">
            <div class="current-level" id="currentLevelDisplay">Level 1: Sunny Meadow</div>
        </div>

        <div class="stats">
            <span>🎈 Score: <span id="gameScore">0</span></span>
            <span>⏱️ Time: <span id="gameTimer">0</span>s</span>
            <span>🎯 Target: <span id="targetScore">0</span></span>
            <span>⭐ Stars: <span id="starsEarned">0</span></span>
        </div>

        <div class="button-group">
            <button id="startBtn" class="start-btn">🚀 Start Game</button>
            <button id="restartBtn" class="restart-btn">🔄 Restart Level</button>
        </div>

        <div class="game-area" id="gameArea"></div>

        <div class="leaderboard">
            <h3>🏆 Global Leaderboard (Top 10)</h3>
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;">
                <button id="showLevel1Lb">Level 1</button>
                <button id="showLevel2Lb">Level 2</button>
                <button id="showLevel3Lb">Level 3</button>
                <button id="showLevel4Lb">Level 4</button>
                <button id="showLevel5Lb">Level 5</button>
            </div>
            <div id="leaderboardContent">Loading...</div>
        </div>
    </div>
</div>

<script>
    // ==================== FIREBASE CONFIGURATION ====================
    // TODO: Replace with your own Firebase project config
    const firebaseConfig = {
						  apiKey: "AIzaSyDWUq268u7nS1FBPN-Ga6Not07_b1BIr2s",
						  authDomain: "myeduhub-games.firebaseapp.com",
						  projectId: "myeduhub-games",
						  storageBucket: "myeduhub-games.firebasestorage.app",
						  messagingSenderId: "889099024670",
						  appId: "1:889099024670:web:b09cc9c6b495448c14b10f"
						};

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Helper: get or create deviceId (same as quiz)
    let deviceId = localStorage.getItem('deviceId');
    if (!deviceId) {
        deviceId = 'dev_' + Math.random().toString(36).substr(2, 16);
        localStorage.setItem('deviceId', deviceId);
    }

    let currentPlayerName = localStorage.getItem('balloonPlayerName') || '';
    let currentDeviceId = deviceId;

    // DOM elements for screens
    const nameScreen = document.getElementById('nameScreen');
    const gameScreen = document.getElementById('gameScreen');
    const playerNameInput = document.getElementById('playerNameInput');
    const enterGameBtn = document.getElementById('enterGameBtn');

    // ---------- GAME STATE ----------
    const levels = {
        1: { name: "Sunny Meadow", speedMin: 5.5, speedMax: 7.0, badChance: 0, goodChance: 0.15, timeLimit: 30, targetScore: 15, pointBad: 0, pointGood: 2, pointNormal: 1 },
        2: { name: "Breezy Hill", speedMin: 4.0, speedMax: 5.5, badChance: 0, goodChance: 0.2, timeLimit: 28, targetScore: 20, pointBad: 0, pointGood: 2, pointNormal: 1 },
        3: { name: "Windy Valley", speedMin: 3.0, speedMax: 4.5, badChance: 0.2, goodChance: 0.2, timeLimit: 25, targetScore: 25, pointBad: -1, pointGood: 2, pointNormal: 1 },
        4: { name: "Stormy Sky", speedMin: 2.2, speedMax: 3.5, badChance: 0.3, goodChance: 0.25, timeLimit: 22, targetScore: 30, pointBad: -1, pointGood: 3, pointNormal: 1 },
        5: { name: "Rainbow Challenge", speedMin: 1.5, speedMax: 2.8, badChance: 0.4, goodChance: 0.3, timeLimit: 20, targetScore: 35, pointBad: -1, pointGood: 4, pointNormal: 1 }
    };

    let currentLevel = 1;
    let unlockedLevels = [1];
    let gameActive = false;
    let gameStarted = false;
    let score = 0;
    let timeLeft = 0;
    let targetScore = 0;
    let levelConfig = null;
    let balloonInterval = null;
    let timerInterval = null;
    let targetReachedFlag = false;
    let totalStarsEarned = 0;

    // DOM game elements
    const levelSelectorDiv = document.getElementById('levelSelector');
    const gameArea = document.getElementById('gameArea');
    const scoreSpan = document.getElementById('gameScore');
    const timerSpan = document.getElementById('gameTimer');
    const targetSpan = document.getElementById('targetScore');
    const starsSpan = document.getElementById('starsEarned');
    const restartBtn = document.getElementById('restartBtn');
    const startBtn = document.getElementById('startBtn');
    const currentLevelDisplay = document.getElementById('currentLevelDisplay');

    // Leaderboard real-time listener
    let currentLeaderboardLevel = 1;
    let unsubscribeLeaderboard = null;

    function renderLeaderboard(level) {
        if (unsubscribeLeaderboard) unsubscribeLeaderboard();
        currentLeaderboardLevel = level;
        const container = document.getElementById('leaderboardContent');
        container.innerHTML = 'Loading...';
        const query = db.collection('gameScores')
            .where('level', '==', level)
            .orderBy('score', 'desc')
            .limit(10);
        unsubscribeLeaderboard = query.onSnapshot(snapshot => {
            if (snapshot.empty) {
                container.innerHTML = '<p style="text-align:center;">✨ No scores yet. Play to be first!</p>';
                return;
            }
            let html = '<tr><th>#</th><th>Name</th><th>Score</th><th>Stars</th><th>Date</th></tr>';
            let rank = 1;
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `<tr>
                    <td>${rank++}</td>
                    <td>${escapeHtml(data.name)}</td>
                    <td>${data.score}</td>
                    <td>${'⭐'.repeat(data.stars)}${'☆'.repeat(3-data.stars)}</td>
                    <td>${new Date(data.timestamp).toLocaleDateString()}</td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }, error => {
            console.error("Leaderboard error:", error);
            container.innerHTML = '<p>Error loading leaderboard.</p>';
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function saveScoreToFirebase(levelNum, finalScore, stars) {
        if (!currentPlayerName || currentPlayerName === '') currentPlayerName = 'Guest';
        try {
            await db.collection('gameScores').add({
                name: currentPlayerName,
                deviceId: currentDeviceId,
                level: levelNum,
                score: finalScore,
                stars: stars,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch(e) { console.warn("Failed to save score:", e); }
    }

    function loadProgress() {
        const saved = localStorage.getItem('balloonUnlocked');
        if (saved) {
            try {
                const arr = JSON.parse(saved);
                if (Array.isArray(arr)) unlockedLevels = arr;
            } catch(e) {}
        }
        renderLevelButtons();
    }

    function saveProgress() {
        localStorage.setItem('balloonUnlocked', JSON.stringify(unlockedLevels));
    }

    function unlockNextLevel() {
        if (currentLevel < 5 && !unlockedLevels.includes(currentLevel+1)) {
            unlockedLevels.push(currentLevel+1);
            saveProgress();
            renderLevelButtons();
            showToastMessage(`🎉 New level unlocked: ${levels[currentLevel+1].name}! 🎉`);
        }
    }

    function showToastMessage(msg, bg='#2ecc71') {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '20%';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bg;
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '50px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '300';
        toast.style.fontSize = '0.9rem';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function renderLevelButtons() {
        levelSelectorDiv.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            if (currentLevel === i) btn.classList.add('active');
            if (!unlockedLevels.includes(i)) btn.classList.add('locked');
            btn.textContent = `${levels[i].name}`;
            btn.onclick = () => {
                if (unlockedLevels.includes(i)) {
                    loadLevel(i);
                } else {
                    showToastMessage(`🔒 Complete level ${i-1} first!`, '#e67e22');
                }
            };
            levelSelectorDiv.appendChild(btn);
        }
    }

    function stopGame() {
        if (balloonInterval) clearInterval(balloonInterval);
        if (timerInterval) clearInterval(timerInterval);
        gameActive = false;
        gameStarted = false;
    }

    function createBalloon() {
        if (!gameActive || !gameStarted) return;
        const cfg = levelConfig;
        const isBad = (cfg.badChance > 0 && Math.random() < cfg.badChance);
        const isGood = (!isBad && cfg.goodChance > 0 && Math.random() < cfg.goodChance);
        
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        if (isBad) balloon.classList.add('bad');
        if (isGood) balloon.classList.add('good');
        
        const maxLeft = gameArea.clientWidth - 60;
        const leftPos = Math.random() * Math.max(10, maxLeft);
        balloon.style.left = leftPos + 'px';
        
        if (!isBad && !isGood) {
            const hue = Math.random() * 360;
            balloon.style.backgroundColor = `hsl(${hue}, 80%, 65%)`;
        } else if (isGood) {
            balloon.style.backgroundColor = 'gold';
        } else {
            balloon.style.backgroundColor = '#95a5a6';
        }
        
        const duration = cfg.speedMin + Math.random() * (cfg.speedMax - cfg.speedMin);
        balloon.style.animationDuration = duration + 's';
        
        balloon.onclick = (e) => {
            e.stopPropagation();
            if (!gameActive || !gameStarted) return;
            let points = 0;
            if (isBad) points = cfg.pointBad;
            else if (isGood) points = cfg.pointGood;
            else points = cfg.pointNormal;
            
            if (points !== 0) {
                score += points;
                if (score < 0) score = 0;
                scoreSpan.textContent = score;
                showPopEffect(balloon.getBoundingClientRect(), points);
                if (isGood && cfg.pointGood >= 3) {
                    timeLeft += 2;
                    updateTimerDisplay();
                    showToastMessage('+2 sec!', '#f1c40f');
                }
                balloon.remove();
                if (!targetReachedFlag && score >= targetScore) {
                    targetReachedFlag = true;
                    showToastMessage('🎉 Target reached! Keep playing for extra points! 🎉', '#2ecc71');
                }
            } else {
                balloon.remove();
            }
        };
        
        gameArea.appendChild(balloon);
        setTimeout(() => {
            if (balloon.parentNode) balloon.remove();
        }, duration * 1000);
    }

    function showPopEffect(rect, points) {
        const pop = document.createElement('div');
        pop.className = 'score-pop';
        const text = points > 0 ? `+${points}` : `${points}`;
        pop.textContent = text;
        pop.style.color = points > 0 ? '#2ecc71' : '#e74c3c';
        pop.style.left = rect.left + 'px';
        pop.style.top = rect.top + 'px';
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 500);
    }

    function updateTimerDisplay() {
        timerSpan.textContent = Math.ceil(timeLeft);
        if (timeLeft <= 5) timerSpan.style.color = '#e74c3c';
        else timerSpan.style.color = 'white';
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameActive || !gameStarted) return;
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                updateTimerDisplay();
                endGame();
            } else {
                updateTimerDisplay();
            }
        }, 100);
    }

    function showNextLevelPopup() {
        const overlay = document.createElement('div');
        overlay.className = 'popup-overlay';
        overlay.innerHTML = `
            <div class="popup-card">
                <h3>🎉 Level ${currentLevel} Complete!</h3>
                <p>You earned ${starsSpan.textContent} stars!</p>
                ${currentLevel < 5 ? '<p>Go to next level?</p>' : '<p>You finished all levels!</p>'}
                <button id="popupNextBtn">${currentLevel < 5 ? '➡️ Next Level' : '🏆 See Total Result'}</button>
                <button id="popupCancelBtn" class="cancel">🔁 Stay here</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('popupNextBtn').onclick = () => {
            overlay.remove();
            if (currentLevel < 5) {
                loadLevel(currentLevel + 1);
                startGame();
            } else {
                showFinalResultPopup();
            }
        };
        document.getElementById('popupCancelBtn').onclick = () => {
            overlay.remove();
        };
    }

    function showFinalResultPopup() {
        const totalStars = totalStarsEarned;
        const maxStars = 15;
        const percentage = (totalStars / maxStars) * 100;
        let message = `You collected ${totalStars} out of ${maxStars} stars! 🌟`;
        if (percentage >= 80) message += " Amazing! 🌟🌟🌟";
        else if (percentage >= 50) message += " Good job! 👍";
        else message += " Keep practicing! 💪";

        const overlay = document.createElement('div');
        overlay.className = 'popup-overlay';
        overlay.innerHTML = `
            <div class="popup-card">
                <h3>🏆 Congratulations!</h3>
                <p>${message}</p>
                <p>Do you want to beat this record?</p>
                <button id="popupRestartBtn">🔄 Start from Level 1</button>
                <button id="popupStayBtn" class="cancel">🏠 Stay here</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('popupRestartBtn').onclick = () => {
            overlay.remove();
            totalStarsEarned = 0;
            loadLevel(1);
        };
        document.getElementById('popupStayBtn').onclick = () => {
            overlay.remove();
        };
    }

    async function endGame() {
        if (!gameActive) return;
        gameActive = false;
        gameStarted = false;
        clearInterval(balloonInterval);
        clearInterval(timerInterval);
        
        const finalScore = score;
        const stars = finalScore >= targetScore * 1.5 ? 3 : (finalScore >= targetScore ? 2 : (finalScore >= targetScore * 0.6 ? 1 : 0));
        starsSpan.textContent = stars;
        
        if (finalScore >= targetScore) {
            totalStarsEarned += stars;
        }
        
        // Save to Firebase
        await saveScoreToFirebase(currentLevel, finalScore, stars);
        
        if (finalScore >= targetScore) {
            unlockNextLevel();
            showToastMessage(`🎉 Level complete! Score: ${finalScore} / ${targetScore}`, '#2ecc71');
            showNextLevelPopup();
        } else {
            showToastMessage(`😢 Time's up! Score: ${finalScore} / ${targetScore}. Try again!`, '#e67e22');
        }
        
        const balloons = document.querySelectorAll('.balloon');
        balloons.forEach(b => b.remove());
        
        // Refresh leaderboard (it's real-time, but force re-query)
        renderLeaderboard(currentLeaderboardLevel);
    }

    function loadLevel(levelNum) {
        stopGame();
        currentLevel = levelNum;
        levelConfig = levels[levelNum];
        if (!levelConfig) return;
        
        currentLevelDisplay.textContent = `Level ${levelNum}: ${levelConfig.name}`;
        score = 0;
        timeLeft = levelConfig.timeLimit;
        targetScore = levelConfig.targetScore;
        targetReachedFlag = false;
        scoreSpan.textContent = '0';
        timerSpan.textContent = timeLeft;
        targetSpan.textContent = targetScore;
        starsSpan.textContent = '0';
        updateTimerDisplay();
        
        gameArea.innerHTML = '';
        renderLevelButtons();
        
        gameActive = true;
        gameStarted = false;
    }

    function startGame() {
        if (!gameActive) return;
        if (gameStarted) return;
        gameStarted = true;
        
        const intervalMs = Math.max(500, Math.floor(levelConfig.speedMin * 300));
        balloonInterval = setInterval(() => {
            if (gameActive && gameStarted) createBalloon();
        }, intervalMs);
        startTimer();
    }

    // Event listeners for game buttons
    restartBtn.onclick = () => { loadLevel(currentLevel); };
    startBtn.onclick = () => {
        if (!gameActive) loadLevel(currentLevel);
        startGame();
    };
    document.getElementById('showLevel1Lb').onclick = () => renderLeaderboard(1);
    document.getElementById('showLevel2Lb').onclick = () => renderLeaderboard(2);
    document.getElementById('showLevel3Lb').onclick = () => renderLeaderboard(3);
    document.getElementById('showLevel4Lb').onclick = () => renderLeaderboard(4);
    document.getElementById('showLevel5Lb').onclick = () => renderLeaderboard(5);

    // Name screen handler
    enterGameBtn.onclick = () => {
        let name = playerNameInput.value.trim();
        if (name === "") {
            alert("Please enter your name");
            return;
        }
        currentPlayerName = name;
        localStorage.setItem('balloonPlayerName', name);
        nameScreen.classList.remove('active');
        gameScreen.classList.add('active');
        // Initialize game
        loadProgress();
        renderLeaderboard(1);
        loadLevel(1);
    };

    // If name already exists, skip name screen
    if (currentPlayerName && currentPlayerName !== '') {
        nameScreen.classList.remove('active');
        gameScreen.classList.add('active');
        loadProgress();
        renderLeaderboard(1);
        loadLevel(1);
    } else {
        playerNameInput.value = '';
    }
</script>
</body>
</html>
