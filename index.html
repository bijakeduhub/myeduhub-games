<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Playground – Quiz & Games</title>
    <!-- Firebase SDKs (required for leaderboards) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(150deg, #0D1B4B, #1B2B6B, #243580);
            margin: 0;
            min-height: 100vh;
            padding: 15px;
        }
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255,255,240,0.95);
            border-radius: 50px;
            padding: 20px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }
        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .nav-btn {
            background: #1B2B6B;
            border: 2px solid #C9963A;
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn.active {
            background: #C9963A;
            color: #1B2B6B;
            border-color: #E8B84B;
        }
        .game-section {
            display: none;
        }
        .game-section.active {
            display: block;
        }
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .popup-card {
            background: white;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            max-width: 280px;
            width: 80%;
        }
        .popup-card button {
            background: #C9963A;
            border: none;
            border-radius: 50px;
            padding: 8px 16px;
            margin: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .popup-card .cancel {
            background: #1B2B6B;
        }
        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .blink {
            animation: blinkAnim 0.5s 3 ease-in-out;
        }
        @keyframes blinkAnim {
            0% { transform: scale(1); background-color: white; }
            50% { transform: scale(1.02); background-color: #fff9c4; }
            100% { transform: scale(1); background-color: white; }
        }
        @media (max-width: 600px) {
            .main-container { padding: 15px; }
            .nav-btn { padding: 6px 14px; font-size: 0.85rem; }
        }
    </style>
    <!-- ========== BALLOON POP STYLES ========== -->
    <style>
        #balloon-section .balloon-stats {
            display: flex;
            justify-content: space-between;
            background: #1B2B6B;
            color: #E8B84B;
            padding: 8px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 6px;
        }
        #balloon-section .balloon-level-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        #balloon-section .balloon-level-btn {
            background: #1B2B6B;
            border: 2px solid #C9963A;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        #balloon-section .balloon-level-btn.active {
            background: #C9963A;
            color: #1B2B6B;
            border-color: #E8B84B;
        }
        #balloon-section .balloon-level-btn.locked {
            opacity: 0.5;
            pointer-events: none;
        }
        #balloon-section .balloon-game-area {
            background: rgba(255,255,255,0.4);
            border-radius: 30px;
            height: 480px;
            position: relative;
            overflow: hidden;
            border: 4px solid #C9963A;
        }
        #balloon-section .balloon {
            position: absolute;
            width: 55px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            animation: floatUp linear forwards;
        }
        #balloon-section .balloon::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            width: 2px;
            height: 15px;
            background: brown;
        }
        #balloon-section .balloon.bad {
            background: #95a5a6;
        }
        #balloon-section .balloon.bad::before {
            content: '❌';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        #balloon-section .balloon.good {
            background: gold;
        }
        #balloon-section .balloon.good::before {
            content: '⭐';
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 18px;
        }
        @keyframes floatUp {
            0% { bottom: -80px; }
            100% { bottom: 100%; }
        }
        #balloon-section .balloon-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        #balloon-section .balloon-btn {
            flex: 1;
            background: #C9963A;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        /* Snake styles */
        #snake-section .snake-container {
            background: #1B2B6B;
            border-radius: 20px;
            padding: 10px;
        }
        #snake-section canvas {
            display: block;
            margin: 0 auto;
            background: #2c3e66;
            border-radius: 16px;
        }
        #snake-section .snake-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
        }
        #snake-section .arrow-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 5px 0;
        }
        #snake-section .arrow-btn {
            background: #C9963A;
            color: white;
            border: none;
            border-radius: 60px;
            width: 65px;
            height: 65px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
        #snake-section .snake-stats {
            display: flex;
            justify-content: space-between;
            background: #1B2B6B;
            color: #E8B84B;
            padding: 8px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        /* Quiz styles (match game) */
        .quiz-container {
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 15px;
            margin-top: 15px;
        }
        .match-wrapper {
            position: relative;
            min-height: 350px;
        }
        .match-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .match-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            position: relative;
            z-index: 5;
        }
        .match-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .match-col-title {
            text-align: center;
            color: #E8B84B;
            font-size: 1rem;
            font-weight: bold;
        }
        .match-item {
            background: white;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #1B2B6B;
            border: 2px solid #C9963A;
        }
        .match-item.selected {
            background: #E8B84B;
            color: white;
        }
        .match-item.paired {
            background: #9B9DA3;
            pointer-events: none;
            opacity: 0.6;
        }
        .quiz-stats {
            display: flex;
            justify-content: space-between;
            background: #1B2B6B;
            color: #E8B84B;
            padding: 8px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .level-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .level-btn {
            background: #1B2B6B;
            border: 2px solid #C9963A;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .level-btn.active {
            background: #C9963A;
            color: #1B2B6B;
        }
        .level-btn.locked {
            opacity: 0.5;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            #snake-section .arrow-btn { width: 55px; height: 55px; font-size: 1.5rem; }
            .match-grid { gap: 20px; }
            .match-item { font-size: 0.9rem; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="nav-bar">
        <button class="nav-btn active" data-section="quiz">🧠 Quiz</button>
        <button class="nav-btn" data-section="balloon">🎈 Balloon Pop</button>
        <button class="nav-btn" data-section="snake">🐍 Snake</button>
    </div>

    <!-- ========== QUIZ SECTION ========== -->
    <div id="quiz-section" class="game-section active">
        <h1 style="text-align:center; color:#ff6b6b;">🧠 Quiz Challenge</h1>
        <div class="level-selector" id="quizLevelSelector"></div>
        <div style="text-align: center;"><div class="current-level" id="quizCurrentLevelDisplay">Level 1: Counting</div></div>
        <div class="quiz-stats">
            <span>🧠 Score: <span id="quizScore">0</span> / 5</span>
            <span>⭐ Stars: <span id="quizStars">0</span></span>
        </div>
        <div id="quizMatchArea"></div>
        <div id="quizFeedback" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
        <div class="leaderboard" style="margin-top:20px; background:white; border-radius:30px; padding:15px;">
            <h3 style="text-align:center;">🏆 Quiz Leaderboard (Top 10)</h3>

                <button id="showQuizLevel1Lb" class="level-btn">L1</button>
                <button id="showQuizLevel2Lb" class="level-btn">L2</button>
                <button id="showQuizLevel3Lb" class="level-btn">L3</button>
                <button id="showQuizLevel4Lb" class="level-btn">L4</button>
                <button id="showQuizLevel5Lb" class="level-btn">L5</button>
            </div>
            <div id="quizLeaderboardContent">Loading...</div>
        </div>
    </div>

    <!-- ========== BALLOON POP SECTION ========== -->
    <div id="balloon-section" class="game-section">
        <h1 style="text-align:center; color:#ff6b6b;">🎈 Balloon Pop</h1>
        <div class="balloon-level-selector" id="balloonLevelSelector"></div>
        <div style="text-align: center;"><div class="current-level" id="balloonCurrentLevelDisplay">Level 1: Sunny Meadow</div></div>
        <div class="balloon-stats">
            <span>🎈 Score: <span id="balloonScore">0</span></span>
            <span>⏱️ Time: <span id="balloonTimer">0</span>s</span>
            <span>🎯 Target: <span id="balloonTarget">0</span></span>
            <span>⭐ Stars: <span id="balloonStars">0</span></span>
        </div>
        <div class="balloon-game-area" id="balloonGameArea"></div>
        <div class="balloon-controls">
            <button class="balloon-btn" id="balloonStartBtn">🚀 Start Game</button>
            <button class="balloon-btn" id="balloonRestartBtn">🔄 Restart Level</button>
        </div>
        <div class="leaderboard" style="margin-top:20px; background:white; border-radius:30px; padding:15px;">
            <h3 style="text-align:center;">🏆 Balloon Leaderboard</h3>
            <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom:10px;">
                <button id="showBalloonLb1" class="level-btn">L1</button>
                <button id="showBalloonLb2" class="level-btn">L2</button>
                <button id="showBalloonLb3" class="level-btn">L3</button>
                <button id="showBalloonLb4" class="level-btn">L4</button>
                <button id="showBalloonLb5" class="level-btn">L5</button>
            </div>
            <div id="balloonLeaderboardContent">Loading...</div>
        </div>
    </div>

    <!-- ========== SNAKE SECTION ========== -->
    <div id="snake-section" class="game-section">
        <h1 style="text-align:center; color:#ff6b6b;">🐍 Snake Game</h1>
        <div class="snake-stats">
            <span>🍎 Score: <span id="snakeScore">0</span></span>
            <span>🏆 Best: <span id="snakeHighScore">0</span></span>
            <span>📏 Length: <span id="snakeLength">3</span></span>
        </div>
        <div class="snake-container">
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
        </div>
        <div class="snake-controls">
            <div class="arrow-row">
                <button class="arrow-btn" data-dir="up">▲</button>
            </div>
            <div class="arrow-row">
                <button class="arrow-btn" data-dir="left">◀</button>
                <button class="arrow-btn" data-dir="down">▼</button>
                <button class="arrow-btn" data-dir="right">▶</button>
            </div>
            <button id="snakeResetBtn" class="balloon-btn" style="margin-top:15px;">🔄 New Game</button>
        </div>
    </div>
</div>

<script>
    // ========== FIREBASE CONFIG (REPLACE WITH YOUR OWN) ==========
    const firebaseConfig = {
  apiKey: "AIzaSyDWUq268u7nS1FBPN-Ga6Not07_b1BIr2s",
  authDomain: "myeduhub-games.firebaseapp.com",
  projectId: "myeduhub-games",
  storageBucket: "myeduhub-games.firebasestorage.app",
  messagingSenderId: "889099024670",
  appId: "1:889099024670:web:b09cc9c6b495448c14b10f"
};
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentPlayerName = localStorage.getItem('playerName') || 'Guest';
    if (currentPlayerName === 'Guest') {
        currentPlayerName = prompt('Enter your name:', 'Guest') || 'Guest';
        localStorage.setItem('playerName', currentPlayerName);
    }

    // Helper functions
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function formatDate(ts) { if (!ts) return '?'; try { if (ts.toDate) return ts.toDate().toLocaleDateString(); const d = new Date(ts); if (!isNaN(d.getTime())) return d.toLocaleDateString(); } catch(e){} return '?'; }

    // ========== NAVIGATION ==========
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${btn.dataset.section}-section`).classList.add('active');
        });
    });

    // ========== BALLOON POP (5 levels, simplified from previous working version) ==========
    const balloonLevels = {
        1: { name: "Sunny Meadow", speedMin: 4.0, speedMax: 6.0, badChance: 0, goodChance: 0.2, timeLimit: 40, targetScore: 15, pointBad: 0, pointGood: 2, pointNormal: 1, spawnDelay: 400 },
        2: { name: "Breezy Hill", speedMin: 3.5, speedMax: 5.5, badChance: 0, goodChance: 0.25, timeLimit: 40, targetScore: 20, pointBad: 0, pointGood: 2, pointNormal: 1, spawnDelay: 380 },
        3: { name: "Windy Valley", speedMin: 3.0, speedMax: 5.0, badChance: 0.15, goodChance: 0.25, timeLimit: 35, targetScore: 25, pointBad: -1, pointGood: 2, pointNormal: 1, spawnDelay: 350 },
        4: { name: "Stormy Sky", speedMin: 2.5, speedMax: 4.5, badChance: 0.25, goodChance: 0.3, timeLimit: 35, targetScore: 30, pointBad: -1, pointGood: 3, pointNormal: 1, spawnDelay: 320 },
        5: { name: "Rainbow Challenge", speedMin: 2.0, speedMax: 4.0, badChance: 0.35, goodChance: 0.35, timeLimit: 30, targetScore: 35, pointBad: -1, pointGood: 4, pointNormal: 1, spawnDelay: 300 }
    };
    let balloonCurrentLevel = 1, balloonUnlocked = [1], balloonActive = false, balloonStarted = false;
    let balloonScore = 0, balloonTimeLeft = 0, balloonTarget = 0, balloonConfig = null, balloonInterval = null, balloonTimer = null, balloonTargetReached = false;
    const balloonLevelSelector = document.getElementById('balloonLevelSelector');
    const balloonGameArea = document.getElementById('balloonGameArea');
    const balloonScoreSpan = document.getElementById('balloonScore');
    const balloonTimerSpan = document.getElementById('balloonTimer');
    const balloonTargetSpan = document.getElementById('balloonTarget');
    const balloonStarsSpan = document.getElementById('balloonStars');
    const balloonStartBtn = document.getElementById('balloonStartBtn');
    const balloonRestartBtn = document.getElementById('balloonRestartBtn');
    const balloonCurrentDisplay = document.getElementById('balloonCurrentLevelDisplay');

    function saveBalloonUnlocked() { localStorage.setItem('balloonUnlocked', JSON.stringify(balloonUnlocked)); }
    function loadBalloonUnlocked() { const s = localStorage.getItem('balloonUnlocked'); if(s) try{ balloonUnlocked = JSON.parse(s); }catch(e){} renderBalloonLevelButtons(); }
    function renderBalloonLevelButtons() {
        balloonLevelSelector.innerHTML = '';
        for(let i=1;i<=5;i++){
            const btn = document.createElement('button');
            btn.className = 'balloon-level-btn';
            if(balloonCurrentLevel === i) btn.classList.add('active');
            if(!balloonUnlocked.includes(i)) btn.classList.add('locked');
            btn.textContent = balloonLevels[i].name;
            btn.onclick = () => { if(balloonUnlocked.includes(i)) loadBalloonLevel(i); else alert('Complete previous level first!'); };
            balloonLevelSelector.appendChild(btn);
        }
    }
    function stopBalloonGame() { if(balloonInterval) clearInterval(balloonInterval); if(balloonTimer) clearInterval(balloonTimer); balloonActive = false; balloonStarted = false; }
    function createBalloon() { if(!balloonActive || !balloonStarted) return; const cfg = balloonConfig; const isBad = (cfg.badChance>0 && Math.random()<cfg.badChance); const isGood = (!isBad && cfg.goodChance>0 && Math.random()<cfg.goodChance); const balloon = document.createElement('div'); balloon.className = 'balloon'; if(isBad) balloon.classList.add('bad'); if(isGood) balloon.classList.add('good'); const maxLeft = balloonGameArea.clientWidth - 60; const leftPos = Math.random() * Math.max(10, maxLeft); balloon.style.left = leftPos+'px'; if(!isBad && !isGood){ const hue = Math.random()*360; balloon.style.backgroundColor = `hsl(${hue},80%,65%)`; }else if(isGood) balloon.style.backgroundColor = 'gold'; else balloon.style.backgroundColor = '#95a5a6'; const duration = cfg.speedMin + Math.random()*(cfg.speedMax-cfg.speedMin); balloon.style.animationDuration = duration+'s'; balloon.onclick = (e) => { e.stopPropagation(); if(!balloonActive || !balloonStarted) return; let points = 0; if(isBad) points = cfg.pointBad; else if(isGood) points = cfg.pointGood; else points = cfg.pointNormal; if(points !== 0){ balloonScore += points; if(balloonScore<0) balloonScore=0; balloonScoreSpan.textContent = balloonScore; if(isGood && cfg.pointGood>=3){ balloonTimeLeft += 2; updateBalloonTimer(); } balloon.remove(); if(!balloonTargetReached && balloonScore>=balloonTarget){ balloonTargetReached=true; } }else{ balloon.remove(); } }; balloonGameArea.appendChild(balloon); setTimeout(()=>{ if(balloon.parentNode) balloon.remove(); }, duration*1000); }
    function updateBalloonTimer(){ balloonTimerSpan.textContent = Math.ceil(balloonTimeLeft); }
    function startBalloonTimer(){ if(balloonTimer) clearInterval(balloonTimer); balloonTimer = setInterval(()=>{ if(!balloonActive || !balloonStarted) return; balloonTimeLeft -= 0.1; if(balloonTimeLeft <= 0){ balloonTimeLeft = 0; updateBalloonTimer(); endBalloonGame(); }else updateBalloonTimer(); },100); }
    async function saveBalloonScore(level, finalScore, stars){ try{ await db.collection('balloon_scores').add({ name: currentPlayerName, level: level, score: finalScore, stars: stars, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); }catch(e){} }
    function showBalloonToast(msg){ const t=document.createElement('div'); t.textContent=msg; t.style.cssText='position:fixed; bottom:20%; left:50%; transform:translateX(-50%); background:#2ecc71; color:white; padding:8px 16px; border-radius:50px; z-index:300;'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function unlockBalloonNext(){ if(balloonCurrentLevel<5 && !balloonUnlocked.includes(balloonCurrentLevel+1)){ balloonUnlocked.push(balloonCurrentLevel+1); saveBalloonUnlocked(); renderBalloonLevelButtons(); showBalloonToast(`🎉 New level unlocked: ${balloonLevels[balloonCurrentLevel+1].name}!`); } }
    async function endBalloonGame(){ if(!balloonActive) return; balloonActive = false; balloonStarted = false; clearInterval(balloonInterval); clearInterval(balloonTimer); const finalScore = balloonScore; let stars = 0; if(finalScore >= balloonTarget*1.5) stars=5; else if(finalScore >= balloonTarget*1.2) stars=4; else if(finalScore >= balloonTarget) stars=3; else if(finalScore >= balloonTarget*0.7) stars=2; else if(finalScore >= balloonTarget*0.4) stars=1; balloonStarsSpan.textContent = stars; await saveBalloonScore(balloonCurrentLevel, finalScore, stars); if(finalScore >= balloonTarget){ unlockBalloonNext(); showBalloonToast(`🎉 Level complete! Score: ${finalScore} / ${balloonTarget}`); }else{ showBalloonToast(`😢 Time's up! Score: ${finalScore} / ${balloonTarget}. Try again!`); } renderBalloonLeaderboard(balloonCurrentLevel); document.querySelectorAll('#balloon-section .balloon').forEach(b=>b.remove()); }
    function loadBalloonLevel(levelNum){ stopBalloonGame(); balloonCurrentLevel = levelNum; balloonConfig = balloonLevels[levelNum]; balloonCurrentDisplay.textContent = `Level ${levelNum}: ${balloonConfig.name}`; balloonScore = 0; balloonTimeLeft = balloonConfig.timeLimit; balloonTarget = balloonConfig.targetScore; balloonTargetReached = false; balloonScoreSpan.textContent = '0'; balloonTimerSpan.textContent = balloonTimeLeft; balloonTargetSpan.textContent = balloonTarget; balloonStarsSpan.textContent = '0'; updateBalloonTimer(); balloonGameArea.innerHTML = ''; renderBalloonLevelButtons(); balloonActive = true; balloonStarted = false; }
    function startBalloonGameLogic(){ if(!balloonActive) return; if(balloonStarted) return; balloonStarted = true; balloonInterval = setInterval(()=>{ if(balloonActive && balloonStarted) createBalloon(); }, balloonConfig.spawnDelay); startBalloonTimer(); }
    balloonStartBtn.onclick = () => { if(!balloonActive) loadBalloonLevel(balloonCurrentLevel); startBalloonGameLogic(); };
    balloonRestartBtn.onclick = () => loadBalloonLevel(balloonCurrentLevel);
    async function renderBalloonLeaderboard(level){
        const container = document.getElementById('balloonLeaderboardContent');
        container.innerHTML = 'Loading...';
        const snapshot = await db.collection('balloon_scores').where('level', '==', level).orderBy('score', 'desc').get();
        const bestMap = new Map();
        snapshot.forEach(doc => { const d = doc.data(); const name = d.name; if(!bestMap.has(name) || bestMap.get(name).score < d.score) bestMap.set(name, { score: d.score, stars: d.stars, timestamp: d.timestamp }); });
        const sorted = Array.from(bestMap.entries()).map(([name,data])=> ({ name, score: data.score, stars: data.stars, timestamp: data.timestamp })).sort((a,b)=> b.score - a.score).slice(0,10);
        if(sorted.length === 0){ container.innerHTML = '<p>No scores yet.</p>'; return; }
        let html = '<table><th>#</th><th>Name</th><th>Score</th><th>Stars</th><th>Date</th></tr>';
        sorted.forEach((e,idx) => { html += `<tr><td>${idx+1}</td><td>${escapeHtml(e.name)}</td><td>${e.score}</td><td>${'⭐'.repeat(e.stars)}${'☆'.repeat(5-e.stars)}</td><td>${formatDate(e.timestamp)}</td></tr>`; });
        container.innerHTML = html + '</table>';
    }
    loadBalloonUnlocked(); loadBalloonLevel(1); renderBalloonLeaderboard(1);
    document.getElementById('showBalloonLb1').onclick = () => renderBalloonLeaderboard(1);
    document.getElementById('showBalloonLb2').onclick = () => renderBalloonLeaderboard(2);
    document.getElementById('showBalloonLb3').onclick = () => renderBalloonLeaderboard(3);
    document.getElementById('showBalloonLb4').onclick = () => renderBalloonLeaderboard(4);
    document.getElementById('showBalloonLb5').onclick = () => renderBalloonLeaderboard(5);

    // ========== SNAKE GAME ==========
    const snakeCanvas = document.getElementById('snakeCanvas');
    const ctx = snakeCanvas.getContext('2d');
    const GRID = 20, CELL_SIZE = snakeCanvas.width / GRID;
    let snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
    let direction = 'right', nextDir = 'right';
    let food = {x:15, y:10};
    let snakeScore = 0;
    let snakeHighScore = localStorage.getItem('snakeHigh') ? parseInt(localStorage.getItem('snakeHigh')) : 0;
    let snakeGameActive = true;
    let snakeLoop = null;
    const snakeScoreSpan = document.getElementById('snakeScore');
    const snakeHighSpan = document.getElementById('snakeHighScore');
    const snakeLengthSpan = document.getElementById('snakeLength');
    snakeHighSpan.textContent = snakeHighScore;
    function generateRandomFood(){ let newFood; do{ newFood = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)}; } while(snake.some(s => s.x === newFood.x && s.y === newFood.y)); food = newFood; }
    function updateSnake(){
        if(!snakeGameActive) return;
        direction = nextDir;
        let newHead = {...snake[0]};
        if(direction === 'right') newHead.x += 1;
        else if(direction === 'left') newHead.x -= 1;
        else if(direction === 'up') newHead.y -= 1;
        else if(direction === 'down') newHead.y += 1;
        if(newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID){ gameOverSnake(); return; }
        const willEat = (newHead.x === food.x && newHead.y === food.y);
        snake.unshift(newHead);
        if(!willEat) snake.pop();
        else { snakeScore += 10; updateSnakeUI(); generateRandomFood(); }
        if(snake.slice(1).some(s => s.x === newHead.x && s.y === newHead.y)){ gameOverSnake(); return; }
        drawSnake();
    }
    function updateSnakeUI(){ snakeScoreSpan.textContent = snakeScore; snakeLengthSpan.textContent = snake.length; if(snakeScore > snakeHighScore){ snakeHighScore = snakeScore; snakeHighSpan.textContent = snakeHighScore; localStorage.setItem('snakeHigh', snakeHighScore); } }
    function gameOverSnake(){ snakeGameActive = false; if(snakeLoop) clearInterval(snakeLoop); drawSnake(); ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,snakeCanvas.width,snakeCanvas.height); ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', snakeCanvas.width/2, snakeCanvas.height/2); }
    function resetSnake(){ snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}]; direction = 'right'; nextDir = 'right'; snakeScore = 0; snakeGameActive = true; updateSnakeUI(); generateRandomFood(); if(snakeLoop) clearInterval(snakeLoop); snakeLoop = setInterval(updateSnake, 120); drawSnake(); }
    function drawSnake(){
        ctx.clearRect(0,0,snakeCanvas.width,snakeCanvas.height);
        ctx.fillStyle = '#E74C3C';
        ctx.fillRect(food.x*CELL_SIZE, food.y*CELL_SIZE, CELL_SIZE-1, CELL_SIZE-1);
        for(let i=0;i<snake.length;i++){
            const seg = snake[i];
            ctx.fillStyle = i===0 ? '#2ECC71' : '#C9963A';
            ctx.fillRect(seg.x*CELL_SIZE, seg.y*CELL_SIZE, CELL_SIZE-1, CELL_SIZE-1);
        }
        if(!snakeGameActive){
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,snakeCanvas.width,snakeCanvas.height);
            ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', snakeCanvas.width/2, snakeCanvas.height/2);
        }
    }
    document.querySelectorAll('#snake-section .arrow-btn').forEach(btn => {
        const dir = btn.dataset.dir;
        btn.addEventListener('click', () => {
            if(!snakeGameActive) return;
            if((dir === 'right' && direction !== 'left') ||
               (dir === 'left' && direction !== 'right') ||
               (dir === 'up' && direction !== 'down') ||
               (dir === 'down' && direction !== 'up')) nextDir = dir;
        });
    });
    document.getElementById('snakeResetBtn').addEventListener('click', resetSnake);
    generateRandomFood(); drawSnake(); snakeLoop = setInterval(updateSnake, 120);

    // ========== QUIZ (5 levels, with enhancements) ==========
    const quizLevels = {
        1: { name: "Counting (Fruits)", generate: () => { const pairs=[], used=new Set(); const fruits=["🍎","🍌","🍊","🍇","🍉"]; while(pairs.length<5){ const count=Math.floor(Math.random()*10)+1; if(!used.has(count)){ used.add(count); const fruit=fruits[Math.floor(Math.random()*fruits.length)]; pairs.push({ left: fruit.repeat(count), right: count.toString() }); } } return pairs; }, instruction: "Count the fruits and match to the correct number." },
        2: { name: "Addition (small)", generate: () => { const pairs=[], used=new Set(); while(pairs.length<5){ const a=Math.floor(Math.random()*9)+1; const b=Math.floor(Math.random()*(10-a))+1; const sum=a+b; if(sum<=10 && !used.has(sum)){ used.add(sum); pairs.push({ left: `${a} + ${b}`, right: sum.toString() }); } } return pairs; }, instruction: "Add the two numbers and match to the sum." },
        3: { name: "Multiplication (small)", generate: () => { const pairs=[], used=new Set(); while(pairs.length<5){ const a=Math.floor(Math.random()*4)+2; const b=Math.floor(Math.random()*4)+2; const prod=a*b; if(!used.has(prod)){ used.add(prod); pairs.push({ left: `${a} × ${b}`, right: prod.toString() }); } } return pairs; }, instruction: "Multiply the numbers and match to the product." },
        4: { name: "Multiplication (big)", generate: () => { const pairs=[], used=new Set(); while(pairs.length<5){ const a=Math.floor(Math.random()*8)+3; const b=Math.floor(Math.random()*8)+3; const prod=a*b; if(!used.has(prod) && prod<=100){ used.add(prod); pairs.push({ left: `${a} × ${b}`, right: prod.toString() }); } } return pairs; }, instruction: "Multiply the numbers (up to 12x12) and match." },
        5: { name: "Flags & Capitals", generate: () => { const countries=[{flag:"🇲🇾",capital:"Kuala Lumpur"},{flag:"🇺🇸",capital:"Washington, D.C."},{flag:"🇬🇧",capital:"London"},{flag:"🇯🇵",capital:"Tokyo"},{flag:"🇫🇷",capital:"Paris"},{flag:"🇩🇪",capital:"Berlin"},{flag:"🇮🇹",capital:"Rome"},{flag:"🇪🇸",capital:"Madrid"},{flag:"🇧🇷",capital:"Brasília"},{flag:"🇦🇺",capital:"Canberra"}]; const shuffled=[...countries]; for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; } return shuffled.slice(0,5).map(c=>({ left: c.flag, right: c.capital })); }, instruction: "Match the flag to its capital city." }
    };
    let quizCurrentLevel = 1, quizUnlocked = [1], quizPairs = [], quizLeftItems = [], quizRightItems = [], quizUserPairs = [], quizSelected = null, quizCompleted = false, quizScoreValue = 0, quizStars = 0;
    const quizLevelSelectorDiv = document.getElementById('quizLevelSelector');
    const quizCurrentDisplay = document.getElementById('quizCurrentLevelDisplay');
    const quizScoreSpan = document.getElementById('quizScore');
    const quizStarsSpan = document.getElementById('quizStars');
    const quizMatchArea = document.getElementById('quizMatchArea');
    const quizFeedbackDiv = document.getElementById('quizFeedback');
    function loadQuizProgress() { const s = localStorage.getItem('quizUnlocked'); if(s) try{ quizUnlocked = JSON.parse(s); }catch(e){} renderQuizLevelButtons(); }
    function saveQuizProgress() { localStorage.setItem('quizUnlocked', JSON.stringify(quizUnlocked)); }
    function unlockQuizNext() { if(quizCurrentLevel<5 && !quizUnlocked.includes(quizCurrentLevel+1)){ quizUnlocked.push(quizCurrentLevel+1); saveQuizProgress(); renderQuizLevelButtons(); showQuizToast(`🎉 New quiz level unlocked: ${quizLevels[quizCurrentLevel+1].name}!`); } }
    function renderQuizLevelButtons() {
        quizLevelSelectorDiv.innerHTML = '';
        for(let i=1;i<=5;i++){ const btn=document.createElement('button'); btn.className='level-btn'; if(quizCurrentLevel===i) btn.classList.add('active'); if(!quizUnlocked.includes(i)) btn.classList.add('locked'); btn.textContent=quizLevels[i].name; btn.onclick=()=>{ if(quizUnlocked.includes(i)) showInstructionPopup(i); else alert('Complete previous level first!'); }; quizLevelSelectorDiv.appendChild(btn); }
    }
    function showInstructionPopup(levelNum){
        const instr = quizLevels[levelNum].instruction;
        const overlay = document.createElement('div'); overlay.className = 'popup-overlay';
        overlay.innerHTML = `<div class="popup-card"><h3>📖 Instructions</h3><p>${instr}</p><button id="startQuizBtn">Start Quiz</button><button id="cancelPopup" class="cancel">Cancel</button></div>`;
        document.body.appendChild(overlay);
        document.getElementById('startQuizBtn').onclick = () => { overlay.remove(); loadQuizLevel(levelNum); };
        document.getElementById('cancelPopup').onclick = () => overlay.remove();
    }
    function loadQuizLevel(levelNum) {
        quizCurrentLevel = levelNum;
        quizCurrentDisplay.textContent = `Level ${levelNum}: ${quizLevels[levelNum].name}`;
        const newPairs = quizLevels[levelNum].generate();
        quizPairs = newPairs;
        quizLeftItems = quizPairs.map((p,i) => ({ display: p.left, matchId: i, matched: false }));
        quizRightItems = shuffle([...quizPairs.map((p,i) => ({ display: p.right, matchId: i, matched: false }))]);
        quizUserPairs = []; quizSelected = null; quizCompleted = false; quizScoreValue = 0; quizStars = 0;
        quizScoreSpan.innerText = '0/5'; quizStarsSpan.innerHTML = '☆☆☆☆☆'; quizFeedbackDiv.innerHTML = '';
        renderQuiz(); renderQuizLevelButtons();
    }
    function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function renderQuiz(){
        const leftHtml = quizLeftItems.map((item,idx) => `<div class="match-item ${item.matched ? 'paired' : ''} ${quizSelected && quizSelected.side==='left' && quizSelected.idx===idx ? 'selected' : ''}" data-side="left" data-idx="${idx}" data-match="${item.matchId}" onclick="selectQuizItem('left',${idx},${item.matchId})">${item.display}</div>`).join('');
        const rightHtml = quizRightItems.map((item,idx) => `<div class="match-item ${item.matched ? 'paired' : ''} ${quizSelected && quizSelected.side==='right' && quizSelected.idx===idx ? 'selected' : ''}" data-side="right" data-idx="${idx}" data-match="${item.matchId}" onclick="selectQuizItem('right',${idx},${item.matchId})">${item.display}</div>`).join('');
        quizMatchArea.innerHTML = `<div class="match-wrapper" id="quizMatchWrapper"><svg class="match-svg" id="quizMatchSvg"></svg><div class="match-grid"><div class="match-col"><div class="match-col-title">➕ Soalan</div>${leftHtml}</div><div class="match-col"><div class="match-col-title">🔢 Jawapan</div>${rightHtml}</div></div></div>`;
        setTimeout(()=>drawQuizLines(false),50);
    }
    function drawQuizLines(final=false){
        const svg = document.getElementById('quizMatchSvg'); const wrapper = document.getElementById('quizMatchWrapper');
        if(!svg || !wrapper) return;
        svg.setAttribute('width', wrapper.offsetWidth); svg.setAttribute('height', wrapper.offsetHeight); svg.innerHTML='';
        for(const pair of quizUserPairs){
            const leftEl = document.querySelector(`.match-item[data-side="left"][data-idx="${pair.leftIdx}"]`);
            const rightEl = document.querySelector(`.match-item[data-side="right"][data-idx="${pair.rightIdx}"]`);
            if(!leftEl || !rightEl) continue;
            const wr = wrapper.getBoundingClientRect(); const lr = leftEl.getBoundingClientRect(); const rr = rightEl.getBoundingClientRect();
            const lx = lr.right - wr.left; const ly = (lr.top+lr.height/2)-wr.top; const rx = rr.left - wr.left; const ry = (rr.top+rr.height/2)-wr.top;
            const mx = (lx+rx)/2; const path = document.createElementNS('http://www.w3.org/2000/svg','path');
            const color = final ? (quizLeftItems[pair.leftIdx].matchId === quizRightItems[pair.rightIdx].matchId ? '#2ECC71' : '#E74C3C') : '#9B9DA3';
            const dash = final ? '' : '5,4';
            path.setAttribute('d', `M${lx},${ly} C${mx},${ly} ${mx},${ry} ${rx},${ry}`);
            path.setAttribute('stroke', color); path.setAttribute('stroke-width','3'); path.setAttribute('fill','none');
            if(dash) path.setAttribute('stroke-dasharray', dash);
            svg.appendChild(path);
        }
    }
    window.selectQuizItem = function(side, idx, matchId){
        if(quizCompleted) return;
        const items = side === 'left' ? quizLeftItems : quizRightItems;
        if(items[idx].matched) return;
        if(!quizSelected){ quizSelected = { side, idx }; renderQuiz(); quizFeedbackDiv.innerHTML = '📌 Pilih padanan di sebelah lain'; return; }
        if(quizSelected.side === side){ quizSelected = { side, idx }; renderQuiz(); return; }
        const leftIdx = side === 'left' ? idx : quizSelected.idx;
        const rightIdx = side === 'right' ? idx : quizSelected.idx;
        quizUserPairs = quizUserPairs.filter(p => p.leftIdx !== leftIdx && p.rightIdx !== rightIdx);
        quizUserPairs.push({ leftIdx, rightIdx });
        quizLeftItems[leftIdx].matched = true; quizRightItems[rightIdx].matched = true;
        quizSelected = null; renderQuiz();
        if(quizUserPairs.length === quizLeftItems.length){
            quizCompleted = true;
            let correct = 0;
            for(const pair of quizUserPairs) if(quizLeftItems[pair.leftIdx].matchId === quizRightItems[pair.rightIdx].matchId) correct++;
            quizScoreValue = correct; quizStars = correct;
            quizScoreSpan.innerText = `${quizScoreValue}/5`; quizStarsSpan.innerHTML = '⭐'.repeat(quizStars) + '☆'.repeat(5-quizStars);
            showQuizResultPopup(correct,5);
            if(currentPlayerName){
                db.collection('quiz_level_scores').add({ name: currentPlayerName, level: quizCurrentLevel, score: correct, stars: quizStars, timestamp: firebase.firestore.FieldValue.serverTimestamp() }).catch(console.warn);
                renderQuizLeaderboard(quizCurrentLevel);
            }
            if(correct >= 3 && quizCurrentLevel < 5 && !quizUnlocked.includes(quizCurrentLevel+1)){
                quizUnlocked.push(quizCurrentLevel+1); saveQuizProgress(); renderQuizLevelButtons(); showQuizToast(`🎉 New quiz level unlocked: ${quizLevels[quizCurrentLevel+1].name}!`);
            }
        } else { quizFeedbackDiv.innerHTML = `✅ ${quizUserPairs.length} / 5 padanan dibuat. Teruskan!`; }
        drawQuizLines(false);
    };
    function showQuizResultPopup(correct, total){
        const overlay = document.createElement('div'); overlay.className = 'popup-overlay';
        const msg = `${currentPlayerName} completed ${quizLevels[quizCurrentLevel].name}!\n✅ Correct: ${correct}/${total}\n⭐ Stars: ${correct}/5`;
        const encoded = encodeURIComponent(msg);
        const nextBtn = (quizCurrentLevel < 5 && correct >= 3) ? `<button id="nextQuizLevelBtn">➡️ Next Level</button>` : '';
        overlay.innerHTML = `<div class="popup-card blink"><h3>🎉 Level ${quizCurrentLevel} Complete!</h3><p>You got ${correct} out of ${total} correct!</p><p>⭐ Stars: ${'⭐'.repeat(correct)}${'☆'.repeat(5-correct)}</p><div class="share-buttons"><button id="shareWAPopup">📱 WhatsApp</button><button id="copyPopup">📋 Copy</button></div>${nextBtn}<button id="closePopup" class="cancel">Close</button></div>`;
        document.body.appendChild(overlay);
        document.getElementById('shareWAPopup').onclick = () => window.open(`https://wa.me/?text=${encoded}`,'_blank');
        document.getElementById('copyPopup').onclick = () => { navigator.clipboard.writeText(msg); alert('Copied!'); };
        if(nextBtn) document.getElementById('nextQuizLevelBtn').onclick = () => { overlay.remove(); loadQuizLevel(quizCurrentLevel+1); };
        document.getElementById('closePopup').onclick = () => overlay.remove();
    }
    function showQuizToast(msg){ const t=document.createElement('div'); t.textContent=msg; t.style.cssText='position:fixed; bottom:20%; left:50%; transform:translateX(-50%); background:#2ecc71; color:white; padding:8px 16px; border-radius:50px; z-index:300;'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    async function renderQuizLeaderboard(level){
        const container = document.getElementById('quizLeaderboardContent');
        container.innerHTML = 'Loading...';
        const snapshot = await db.collection('quiz_level_scores').where('level', '==', level).orderBy('score', 'desc').get();
        const bestMap = new Map();
        snapshot.forEach(doc => { const d = doc.data(); const name = d.name; if(!bestMap.has(name) || bestMap.get(name).score < d.score) bestMap.set(name, { score: d.score, stars: d.stars, timestamp: d.timestamp }); });
        const sorted = Array.from(bestMap.entries()).map(([name,data])=> ({ name, score: data.score, stars: data.stars, timestamp: data.timestamp })).sort((a,b)=> b.score - a.score).slice(0,10);
        if(sorted.length === 0){ container.innerHTML = '<p>No scores yet.</p>'; return; }
        let html = '<td><th>#</th><th>Name</th><th>Score</th><th>Stars</th><th>Date</th></tr>';
        sorted.forEach((e,idx) => { html += `<tr><td>${idx+1}</td><td>${escapeHtml(e.name)}</td><td>${e.score}/5</td><td>${'⭐'.repeat(e.stars)}${'☆'.repeat(5-e.stars)}</td><td>${formatDate(e.timestamp)}</td></tr>`; });
        container.innerHTML = html + '</table>';
    }
    loadQuizProgress(); renderQuizLeaderboard(1); loadQuizLevel(1);
    document.getElementById('showQuizLevel1Lb').onclick = () => renderQuizLeaderboard(1);
    document.getElementById('showQuizLevel2Lb').onclick = () => renderQuizLeaderboard(2);
    document.getElementById('showQuizLevel3Lb').onclick = () => renderQuizLeaderboard(3);
    document.getElementById('showQuizLevel4Lb').onclick = () => renderQuizLeaderboard(4);
    document.getElementById('showQuizLevel5Lb').onclick = () => renderQuizLeaderboard(5);
</script>
